<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Stickman Clash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070a14;
  --panel:#0f1730;
  --panel-border:#22345c;
  --cyan:#00e5ff;
  --violet:#b14bff;
  --text:#e8f2ff;
  --muted:#7288ad;
  --danger:#ff3b5c;
  --good:#33ffb0;
  --gold:#ffd93d;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;}
#app{position:relative;width:100%;height:100vh;}
.bg-grid{position:fixed;inset:0;z-index:0;
  background-image:
    radial-gradient(circle at 50% 10%, rgba(0,229,255,0.10), transparent 55%),
    repeating-linear-gradient(0deg, rgba(0,229,255,0.035) 0px, transparent 1px, transparent 38px),
    repeating-linear-gradient(90deg, rgba(0,229,255,0.035) 0px, transparent 1px, transparent 38px);
  pointer-events:none;
}
.screen{position:relative;z-index:1;display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;overflow-y:auto;}
.screen.active{display:flex;}

h1.logo{font-family:'Orbitron';font-weight:800;font-size:clamp(24px,6vw,40px);letter-spacing:3px;margin:0 0 6px;
 color:var(--text); text-shadow:0 0 18px rgba(0,229,255,0.65), 0 0 40px rgba(177,75,255,0.25);}
.logo span{color:var(--cyan);}
.subtitle{color:var(--muted);font-size:15px;margin-bottom:26px;letter-spacing:1px;}

.portal{position:relative;width:140px;height:140px;border-radius:50%;margin:0 auto 24px;
 background:radial-gradient(circle at 50% 45%, rgba(0,229,255,0.28), rgba(6,10,22,0.1) 70%);
 box-shadow:0 0 60px rgba(0,229,255,0.35), inset 0 0 40px rgba(0,229,255,0.25);}
.portal::before{content:'';position:absolute;inset:-6px;border-radius:50%;
 background:conic-gradient(from 0deg, var(--cyan), transparent 25%, var(--violet), transparent 60%, var(--cyan));
 -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
 mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
 animation:spin 6s linear infinite;}
@media (prefers-reduced-motion: reduce){ .portal::before{animation:none;} }
@keyframes spin{to{transform:rotate(360deg);}}

.choice-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.btn{
 font-family:'Rajdhani';font-weight:700;font-size:15px;letter-spacing:1px;text-transform:uppercase;
 color:var(--cyan);background:rgba(0,229,255,0.05);border:2px solid var(--cyan);
 padding:12px 22px;cursor:pointer;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
 transition:all .15s ease;
}
.btn:hover{background:rgba(0,229,255,0.18);box-shadow:0 0 18px rgba(0,229,255,0.45);}
.btn.selected{background:var(--cyan);color:#04121a;box-shadow:0 0 22px rgba(0,229,255,0.6);}
.btn.violet{border-color:var(--violet);color:var(--violet);}
.btn.violet.selected{background:var(--violet);color:#160426;box-shadow:0 0 22px rgba(177,75,255,0.6);}
.btn.big{padding:16px 36px;font-size:18px;}
.btn.small{padding:7px 12px;font-size:12px;}
.btn:disabled{opacity:.3;cursor:not-allowed;}

.setup-wrap{width:100%;max-width:980px;}
.count-row{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
.slots{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px;}
.slot-card{background:var(--panel);border:1px solid var(--panel-border);border-left:5px solid var(--slot-color,var(--cyan));
 padding:12px;text-align:left;}
.slot-card h3{font-family:'Orbitron';font-size:13px;letter-spacing:1px;margin:0 0 10px;color:var(--text);display:flex;justify-content:space-between;align-items:center;gap:6px;}
.slot-card .tag{font-size:9px;background:var(--panel-border);padding:3px 7px;border-radius:3px;color:var(--muted);white-space:nowrap;}
.row-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:9px 0 6px;}
.type-row{display:flex;gap:6px;flex-wrap:wrap;}
.swatch-row{display:flex;gap:7px;flex-wrap:wrap;}
.swatch{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;}
.swatch.selected{border-color:#fff;box-shadow:0 0 10px currentColor;}
.keybind-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px;}
.keybind-grid button{font-size:10px;padding:6px 3px;}
.stat-line{font-size:11px;color:var(--muted);margin-bottom:8px;}

#screen-game{padding:0;}
#topbar{position:absolute;top:6px;right:6px;display:flex;gap:6px;z-index:7;}
#hud{position:relative;display:flex;gap:6px;justify-content:center;padding:6px;flex-wrap:wrap;z-index:3;}
.hud-item{background:rgba(10,15,30,0.75);border:1px solid var(--panel-border);padding:4px 8px;display:flex;align-items:center;gap:6px;min-width:100px;}
.hud-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.hud-bar{width:62px;height:7px;background:#1a2240;position:relative;overflow:hidden;}
.hud-fill{height:100%;background:var(--good);transition:width .15s;}

#canvas-wrap{position:relative;width:100%;max-width:1000px;margin:0 auto;}
canvas{width:100%;height:auto;display:block;}

#countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-size:56px;color:var(--cyan);text-shadow:0 0 30px rgba(0,229,255,0.8);pointer-events:none;z-index:4;}

.touch-cluster{position:absolute;bottom:10px;display:flex;gap:8px;align-items:flex-end;z-index:5;}
.touch-cluster.left{left:10px;}
.touch-cluster.right{right:10px;}
.tbtn{width:48px;height:48px;border-radius:50%;background:rgba(0,229,255,0.14);border:2px solid var(--cyan);color:var(--cyan);
 display:flex;align-items:center;justify-content:center;font-size:18px;touch-action:none;-webkit-touch-callout:none;}
.tbtn.active-touch{background:rgba(0,229,255,0.45);}
.tbtn.danger{border-color:var(--danger);color:var(--danger);}
.tbtn.danger.active-touch{background:rgba(255,59,92,0.4);}
.dpad{display:flex;gap:5px;align-items:center;}
.actionpad{display:flex;flex-direction:column;gap:5px;}

#winOverlay{position:absolute;inset:0;background:rgba(4,8,18,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:6;padding:20px;text-align:center;}
#winOverlay.hidden{display:none;}
#winOverlay h2{font-family:'Orbitron';font-size:28px;color:var(--gold);text-shadow:0 0 26px rgba(255,217,61,0.6);margin:0;}

#homeStats{display:flex;gap:20px;margin-bottom:26px;font-family:'Orbitron';font-size:14px;}

#rotateNotice{display:none;position:fixed;inset:0;background:var(--bg);color:var(--text);z-index:99;align-items:center;justify-content:center;font-family:'Orbitron';font-size:16px;text-align:center;padding:20px;line-height:1.7;}
#rotateNotice.mobile-active{display:none;}
@media (max-width:900px) and (orientation:portrait){ #rotateNotice.mobile-active{display:flex;} }
</style>
</head>
<body>
<div id="app">
  <div class="bg-grid"></div>

  <section id="screen-device" class="screen active">
    <div class="portal"></div>
    <h1 class="logo">STICKMAN <span>CLASH</span></h1>
    <div class="subtitle">Neon Arena Fighter — pehle apna device chuno</div>
    <div class="choice-row">
       <button class="btn big" onclick="selectDevice('pc')">💻 PC</button>
       <button class="btn big violet" onclick="selectDevice('mobile')">📱 Mobile</button>
    </div>
  </section>

  <section id="screen-home" class="screen">
    <h1 class="logo">STICKMAN <span>CLASH</span></h1>
    <div class="subtitle">Neon Arena Fighter</div>
    <div id="homeStats">
       <div>🪙 <span id="homeCoins">0</span></div>
       <div>⭐ Level <span id="homeLevel">1</span></div>
    </div>
    <div class="choice-row" style="margin-bottom:14px;">
      <button class="btn big" onclick="goToScreen('setup');renderSetup();">▶ PLAY</button>
    </div>
    <div class="choice-row">
      <button class="btn" onclick="goToScreen('shop');renderShop();">🛒 Shop</button>
      <button class="btn" id="bonusBtn" onclick="claimBonus()">🎁 Bonus Chest (+50)</button>
    </div>
  </section>

  <section id="screen-setup" class="screen">
     <div class="setup-wrap" id="setupWrap"></div>
  </section>

  <section id="screen-shop" class="screen">
     <div class="setup-wrap" id="shopWrap"></div>
  </section>

  <section id="screen-game" class="screen">
    <div id="topbar">
       <button class="btn small" id="pauseBtn" onclick="togglePause()">⏸</button>
       <button class="btn small" onclick="exitMatch()">✕ Exit</button>
    </div>
    <div id="canvas-wrap">
       <div id="hud"></div>
       <canvas id="arena" width="1000" height="560"></canvas>
       <div id="countdown"></div>
       <div id="touchControls"></div>
       <div id="winOverlay" class="hidden">
          <h2 id="winTitle">Winner!</h2>
          <div id="winSub" style="color:var(--muted)"></div>
          <div id="winReward" style="color:var(--gold);font-family:'Orbitron';font-size:13px;"></div>
          <div class="choice-row">
             <button class="btn big" onclick="rematch()">🔁 Rematch</button>
             <button class="btn" onclick="backToSetup()">⚙️ Setup</button>
             <button class="btn" onclick="goHomeFromWin()">🏠 Home</button>
          </div>
       </div>
    </div>
  </section>

  <div id="rotateNotice">🔄<br>Best experience ke liye phone ko<br><b>Landscape (side)</b> mode mein karo</div>
</div>

<script>
/* ================= CONSTANTS ================= */
const ACTIONS = ['left','right','jump','attack','block'];
const ACTION_LABELS = {left:'◀ Left', right:'▶ Right', jump:'▲ Jump', attack:'⚔ Attack', block:'🛡 Block'};
const WEAPON_COLORS = ['#00e5ff','#ff4d5e','#3dffa0','#ffd93d','#ffffff','#ff8a3d'];
const DEFAULT_KEYSETS = [
  {left:'KeyA', right:'KeyD', jump:'KeyW', attack:'Space', block:'ShiftLeft'},
  {left:'KeyJ', right:'KeyL', jump:'KeyI', attack:'KeyU', block:'KeyO'},
  {left:'ArrowLeft', right:'ArrowRight', jump:'ArrowUp', attack:'Period', block:'Slash'},
  {left:'Numpad4', right:'Numpad6', jump:'Numpad8', attack:'Numpad5', block:'Numpad0'},
  {left:'KeyF', right:'KeyH', jump:'KeyT', attack:'KeyG', block:'KeyY'}
];

/* Weapon roster - stats inspired by a typical stickman brawler's varied loadout */
const WEAPON_DEFS = {
  sword:  {label:'🗡️ Sword',  cost:0,   damage:12, range:80,  cooldown:550, duration:320, knockback:5,  type:'melee',  len:52},
  spear:  {label:'🔱 Spear',  cost:100, damage:9,  range:100, cooldown:480, duration:300, knockback:4,  type:'melee',  len:70},
  axe:    {label:'🪓 Axe',    cost:150, damage:18, range:75,  cooldown:750, duration:380, knockback:8,  type:'melee',  len:42},
  katana: {label:'⚔️ Katana', cost:200, damage:8,  range:70,  cooldown:320, duration:220, knockback:3,  type:'melee',  len:60},
  claw:   {label:'🐾 Claw',   cost:250, damage:6,  range:55,  cooldown:260, duration:180, knockback:2,  type:'melee',  len:30},
  hammer: {label:'🔨 Hammer', cost:300, damage:22, range:70,  cooldown:900, duration:420, knockback:12, type:'melee',  len:46},
  bow:    {label:'🏹 Bow',    cost:350, damage:10, range:520, cooldown:700, duration:260, knockback:3,  type:'ranged', len:0, projectileSpeed:9}
};
const WEAPON_ORDER = ['sword','spear','axe','katana','claw','hammer','bow'];

/* Original stickman skins - no licensed/copyrighted characters */
const SKINS = [
  {id:'neonRed',       color:'#ff4d5e', cost:0,   fx:'none'},
  {id:'cyberBlue',     color:'#3da9ff', cost:0,   fx:'none'},
  {id:'toxicGreen',    color:'#3dffa0', cost:0,   fx:'none'},
  {id:'solarGold',     color:'#ffd93d', cost:0,   fx:'none'},
  {id:'voidPurple',    color:'#c46dff', cost:0,   fx:'none'},
  {id:'crimsonReaper', color:'#ff2050', cost:250, fx:'glow'},
  {id:'ghostWhite',    color:'#eaffff', cost:250, fx:'ghost'},
  {id:'plasmaCyan',    color:'#00fff2', cost:400, fx:'glow'}
];
const FREE_SKINS = ['neonRed','cyberBlue','toxicGreen','solarGold','voidPurple'];

/* Arenas with different gimmicks */
const ARENAS = [
  {id:'flat',     label:'Neon Flat',       cost:0},
  {id:'pingpong', label:'Ping-Pong',       cost:0},
  {id:'wavy',     label:'Wavy Tilt',       cost:150},
  {id:'lava',     label:'Lava Pulse',      cost:300},
  {id:'shrink',   label:'Shrinking Circle',cost:450}
];

const GROUND_Y=460, SPEED=3.4, GRAVITY=0.62, JUMP_FORCE=-11.5;
const HURT_DURATION=260, DEATH_DURATION=500;
const CW=1000, CH=560;

/* ================= STATE ================= */
let device=null;
let playerCount=3;
let slots=[];
let listening=null;
let fighters=[];
let projectiles=[];
let matchActive=false, paused=false, animId=null, lastTime=0;
let keyState={}, keyDownEdge={}, usedKeyCodes=new Set();
let touchHeld={}, touchEdge={};

let coins=300, xpTotal=0, level=1, bonusClaimed=false;
let unlockedWeapons=new Set(['sword']);
let unlockedSkins=new Set(FREE_SKINS);
let unlockedArenas=new Set(['flat','pingpong']);
let selectedArenaId='flat';
let currentArena=null, matchElapsed=0;
let arenaMin=40, arenaMax=960;

const canvas=document.getElementById('arena');
const ctx=canvas.getContext('2d');

/* ================= SCREEN NAV ================= */
function goToScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
}

function selectDevice(d){
  device=d;
  slots=defaultSlots();
  document.getElementById('rotateNotice').classList.toggle('mobile-active', d==='mobile');
  goToScreen('home');
  renderHome();
}

/* ================= HOME / SHOP ================= */
function renderHome(){
  document.getElementById('homeCoins').textContent=coins;
  document.getElementById('homeLevel').textContent=level;
  const b=document.getElementById('bonusBtn');
  if(bonusClaimed){ b.disabled=true; b.textContent='🎁 Claimed this session'; }
  else { b.disabled=false; b.textContent='🎁 Bonus Chest (+50)'; }
}
function claimBonus(){
  if(bonusClaimed) return;
  coins+=50; bonusClaimed=true;
  renderHome();
}

function renderShop(){
  let html='<h1 class="logo">SHOP</h1>';
  html+='<div style="font-family:\'Orbitron\';font-size:15px;margin-bottom:18px;">🪙 '+coins+' Coins</div>';

  html+='<div class="row-label">Weapons</div><div class="slots">';
  WEAPON_ORDER.forEach(id=>{
    const w=WEAPON_DEFS[id]; const owned=unlockedWeapons.has(id);
    html+='<div class="slot-card"><h3>'+w.label+'</h3>';
    html+='<div class="stat-line">DMG '+w.damage+' • RNG '+w.range+' • '+(w.type==='ranged'?'Ranged':'Melee')+'</div>';
    html+= owned ? '<button class="btn small selected" disabled>✅ Owned</button>'
                 : '<button class="btn small" '+(coins<w.cost?'disabled':'')+' onclick="buyWeapon(\''+id+'\')">Buy 🪙'+w.cost+'</button>';
    html+='</div>';
  });
  html+='</div>';

  html+='<div class="row-label">Skins</div><div class="slots">';
  SKINS.forEach(s=>{
    const owned=unlockedSkins.has(s.id);
    html+='<div class="slot-card" style="--slot-color:'+s.color+'"><h3><span class="swatch" style="background:'+s.color+';display:inline-block;width:16px;height:16px;"></span> '+s.id+'</h3>';
    html+= owned ? '<button class="btn small selected" disabled>✅ Owned</button>'
                 : '<button class="btn small" '+(coins<s.cost?'disabled':'')+' onclick="buySkin(\''+s.id+'\')">Buy 🪙'+s.cost+'</button>';
    html+='</div>';
  });
  html+='</div>';

  html+='<div class="row-label">Arenas</div><div class="slots">';
  ARENAS.forEach(a=>{
    const owned=unlockedArenas.has(a.id);
    html+='<div class="slot-card"><h3>'+a.label+'</h3>';
    html+= owned ? '<button class="btn small selected" disabled>✅ Owned</button>'
                 : '<button class="btn small" '+(coins<a.cost?'disabled':'')+' onclick="buyArena(\''+a.id+'\')">Buy 🪙'+a.cost+'</button>';
    html+='</div>';
  });
  html+='</div>';

  html+='<button class="btn big" style="margin-top:6px;" onclick="goToScreen(\'home\');renderHome();">🏠 Back Home</button>';
  document.getElementById('shopWrap').innerHTML=html;
}
function buyWeapon(id){ const w=WEAPON_DEFS[id]; if(coins>=w.cost){ coins-=w.cost; unlockedWeapons.add(id); renderShop(); } }
function buySkin(id){ const s=SKINS.find(x=>x.id===id); if(coins>=s.cost){ coins-=s.cost; unlockedSkins.add(id); renderShop(); } }
function buyArena(id){ const a=ARENAS.find(x=>x.id===id); if(coins>=a.cost){ coins-=a.cost; unlockedArenas.add(id); renderShop(); } }

/* ================= SETUP DATA ================= */
function defaultSlots(){
  return Array.from({length:5},(_,i)=>({
    type: i<2 ? 'player' : 'computer',
    skin: FREE_SKINS[i],
    weaponColor: WEAPON_COLORS[i % WEAPON_COLORS.length],
    weaponType: 'sword',
    keys: Object.assign({}, DEFAULT_KEYSETS[i])
  }));
}
function getSkinColor(id){ const s=SKINS.find(x=>x.id===id); return s ? s.color : '#00e5ff'; }
function getSkinFx(id){ const s=SKINS.find(x=>x.id===id); return s ? s.fx : 'none'; }
function countPlayers(){
  let c=0;
  for(let i=0;i<playerCount;i++) if(slots[i].type==='player') c++;
  return c;
}
function keyLabel(code){
  const map={Space:'Space',ShiftLeft:'Shift',ShiftRight:'Shift',ArrowLeft:'←',ArrowRight:'→',ArrowUp:'↑',ArrowDown:'↓',
    Period:'.',Slash:'/',Comma:',',Numpad0:'Num0',Numpad4:'Num4',Numpad5:'Num5',Numpad6:'Num6',Numpad8:'Num8'};
  if(map[code]) return map[code];
  if(code.startsWith('Key')) return code.slice(3);
  if(code.startsWith('Digit')) return code.slice(5);
  return code;
}

/* ================= SETUP RENDERING ================= */
function renderSetup(){
  const wrap=document.getElementById('setupWrap');
  let html='';
  html+='<h1 class="logo">SETUP <span>ARENA</span></h1>';
  html+='<div class="count-row">';
  for(let n=2;n<=5;n++){
    html+='<button class="btn '+(playerCount===n?'selected':'')+'" onclick="setCount('+n+')">'+n+' Players</button>';
  }
  html+='</div>';
  html+=renderArenaRow();
  html+='<div class="slots">';
  for(let i=0;i<playerCount;i++){
    html+=renderSlotCard(i, slots[i]);
  }
  html+='</div>';
  html+='<div id="setupMsg" style="color:var(--danger);min-height:20px;margin-bottom:6px;font-weight:600;"></div>';
  html+='<div class="choice-row">';
  html+='<button class="btn" onclick="goToScreen(\'home\');renderHome();">🏠 Back</button>';
  html+='<button class="btn big" onclick="validateAndStart()">▶ Start Fight</button>';
  html+='</div>';
  wrap.innerHTML=html;
}

function renderArenaRow(){
  let html='<div class="row-label" style="text-align:center;">Arena</div><div class="choice-row" style="margin-bottom:16px;">';
  ARENAS.forEach(a=>{
    const locked=!unlockedArenas.has(a.id);
    html+='<button class="btn small '+(selectedArenaId===a.id?'selected':'')+'" style="'+(locked?'opacity:.5':'')+'" onclick="setArena(\''+a.id+'\')">'+(locked?'🔒 ':'')+a.label+(locked?' ('+a.cost+'🪙)':'')+'</button>';
  });
  html+='</div>';
  return html;
}
function setArena(id){
  if(!unlockedArenas.has(id)){ showSetupMsg('🔒 Ye arena locked hai — Shop se unlock karo!'); return; }
  selectedArenaId=id; renderSetup();
}

function renderSlotCard(i,s){
  const canBePlayer = device!=='mobile' || s.type==='player' || countPlayers()<2;
  const col=getSkinColor(s.skin);
  let html='<div class="slot-card" style="--slot-color:'+col+'">';
  html+='<h3>P'+(i+1)+' <span class="tag">'+(s.type==='computer'?'🤖 CPU':'🧑 Player')+'</span></h3>';
  html+='<div class="type-row">';
  html+='<button class="btn small '+(s.type==='player'?'selected':'')+'" '+(!canBePlayer?'disabled':'')+' onclick="setSlotType('+i+',\'player\')">Player</button>';
  html+='<button class="btn small '+(s.type==='computer'?'selected':'')+'" onclick="setSlotType('+i+',\'computer\')">Computer</button>';
  html+='</div>';

  html+='<div class="row-label">Skin</div><div class="swatch-row">';
  SKINS.forEach(sk=>{
    const locked=!unlockedSkins.has(sk.id);
    html+='<div class="swatch '+(s.skin===sk.id?'selected':'')+'" style="background:'+sk.color+';color:'+sk.color+(locked?';opacity:.3':'')+'" onclick="setSlotSkin('+i+',\''+sk.id+'\')"></div>';
  });
  html+='</div>';

  html+='<div class="row-label">Weapon</div><div class="type-row">';
  WEAPON_ORDER.forEach(wid=>{
    const w=WEAPON_DEFS[wid]; const locked=!unlockedWeapons.has(wid);
    html+='<button class="btn small '+(s.weaponType===wid?'selected':'')+'" style="'+(locked?'opacity:.4':'')+'" onclick="setSlotWeapon('+i+',\''+wid+'\')">'+(locked?'🔒 ':'')+w.label+'</button>';
  });
  html+='</div>';

  html+='<div class="row-label">Weapon Color</div><div class="swatch-row">';
  WEAPON_COLORS.forEach(c=>{
    html+='<div class="swatch '+(s.weaponColor===c?'selected':'')+'" style="background:'+c+';color:'+c+'" onclick="setSlotWeaponColor('+i+',\''+c+'\')"></div>';
  });
  html+='</div>';

  if(device==='pc' && s.type==='player'){
    html+='<div class="row-label">Keybinds (tap to rebind)</div><div class="keybind-grid">';
    ACTIONS.forEach(act=>{
      const isListening = listening && listening.i===i && listening.action===act;
      const label = isListening ? 'Press a key…' : keyLabel(s.keys[act]);
      html+='<button class="btn small" onclick="startListen('+i+',\''+act+'\')">'+ACTION_LABELS[act]+': '+label+'</button>';
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function setCount(n){ playerCount=n; renderSetup(); }
function setSlotType(i,type){
  if(device==='mobile' && type==='player' && slots[i].type!=='player' && countPlayers()>=2){
    showSetupMsg('Mobile pe max 2 Players allowed, baaki Computer rahenge 🤖');
    return;
  }
  slots[i].type=type;
  renderSetup();
}
function setSlotSkin(i,id){
  if(!unlockedSkins.has(id)){ showSetupMsg('🔒 Ye skin locked hai — Shop se unlock karo!'); return; }
  slots[i].skin=id; renderSetup();
}
function setSlotWeapon(i,id){
  if(!unlockedWeapons.has(id)){ showSetupMsg('🔒 Ye weapon locked hai — Shop se unlock karo!'); return; }
  slots[i].weaponType=id; renderSetup();
}
function setSlotWeaponColor(i,c){ slots[i].weaponColor=c; renderSetup(); }
function showSetupMsg(msg){ const el=document.getElementById('setupMsg'); if(el) el.textContent=msg; }

function startListen(i,action){
  listening={i,action};
  renderSetup();
  const handler=(e)=>{
    e.preventDefault(); e.stopPropagation();
    slots[i].keys[action]=e.code;
    listening=null;
    window.removeEventListener('keydown',handler,true);
    renderSetup();
  };
  window.addEventListener('keydown',handler,true);
}

function validateAndStart(){
  if(device==='pc'){
    const used=new Set();
    for(let i=0;i<playerCount;i++){
      if(slots[i].type!=='player') continue;
      for(const act of ACTIONS){
        const code=slots[i].keys[act];
        if(used.has(code)){ showSetupMsg('⚠️ Keybind clash! Har player ki keys alag rakho.'); return; }
        used.add(code);
      }
    }
  }
  startMatch();
}

/* ================= MATCH SETUP ================= */
function startMatch(){
  fighters=[];
  projectiles=[];
  matchElapsed=0;
  arenaMin=40; arenaMax=960;
  const arenaDef = ARENAS.find(a=>a.id===selectedArenaId) || ARENAS[0];
  currentArena = Object.assign({}, arenaDef, {lavaWarn:false, lavaHot:false, _lastTickCycle:-1});

  const n=playerCount;
  for(let i=0;i<n;i++){
    const s=slots[i];
    const spawnX = n===1 ? 500 : 100 + i*((900-100)/(n-1));
    fighters.push({
      id:i, type:s.type, color:getSkinColor(s.skin), skinFx:getSkinFx(s.skin),
      weaponColor:s.weaponColor, weaponType:s.weaponType, keys:s.keys,
      x:spawnX, y:GROUND_Y, vx:0, vy:0, facing: spawnX<500?1:-1,
      hp:100, state:'idle', grounded:true,
      attackTimer:0, attackCooldown:0, hasHit:false,
      hurtTimer:0, deathTimer:0, animTime:Math.random()*1000,
      ai:{decisionTimer:0, decision:{left:false,right:false,jump:false,attack:false,block:false}}
    });
  }
  touchHeld={}; touchEdge={}; keyState={}; keyDownEdge={};
  computeUsedKeys();
  buildHUD();
  buildTouchControls();
  document.getElementById('winOverlay').classList.add('hidden');
  document.getElementById('pauseBtn').textContent='⏸';
  paused=false;
  goToScreen('game');
  runCountdown(()=>{
    matchActive=true;
    lastTime=performance.now();
    animId=requestAnimationFrame(loop);
  });
}

function computeUsedKeys(){
  usedKeyCodes=new Set();
  if(device==='pc'){
    fighters.forEach(f=>{ if(f.type==='player'){ Object.values(f.keys).forEach(c=>usedKeyCodes.add(c)); } });
  }
}

function runCountdown(cb){
  const el=document.getElementById('countdown');
  const seq=['3','2','1','FIGHT!'];
  let idx=0;
  el.textContent=seq[0];
  const iv=setInterval(()=>{
    idx++;
    if(idx<seq.length){ el.textContent=seq[idx]; }
    else { clearInterval(iv); el.textContent=''; cb(); }
  },700);
}

/* ================= HUD ================= */
function buildHUD(){
  const hud=document.getElementById('hud');
  hud.innerHTML='';
  fighters.forEach(f=>{
    const div=document.createElement('div');
    div.className='hud-item';
    div.innerHTML='<span class="hud-dot" style="background:'+f.color+'"></span>'+
      '<div style="flex:1"><div style="font-size:10px;color:var(--muted)">P'+(f.id+1)+(f.type==='computer'?' 🤖':'')+'</div>'+
      '<div class="hud-bar"><div class="hud-fill" id="hp-'+f.id+'" style="width:100%"></div></div></div>';
    hud.appendChild(div);
  });
}
function updateHUD(){
  fighters.forEach(f=>{
    const bar=document.getElementById('hp-'+f.id);
    if(!bar) return;
    const pct=Math.max(0,f.hp);
    bar.style.width=pct+'%';
    bar.style.background = pct>50 ? 'var(--good)' : pct>20 ? 'var(--gold)' : 'var(--danger)';
  });
}

/* ================= TOUCH CONTROLS ================= */
function buildTouchControls(){
  const el=document.getElementById('touchControls');
  el.innerHTML='';
  if(device!=='mobile') return;
  const touchFighters=fighters.filter(f=>f.type==='player');
  touchFighters.forEach((f,idx)=>{
    const side= idx===0 ? 'left':'right';
    const cluster=document.createElement('div');
    cluster.className='touch-cluster '+side;
    cluster.innerHTML=
      '<div class="dpad">'+
        '<button class="tbtn" data-fid="'+f.id+'" data-act="left">◀</button>'+
        '<div class="actionpad"><button class="tbtn" data-fid="'+f.id+'" data-act="jump">▲</button></div>'+
        '<button class="tbtn" data-fid="'+f.id+'" data-act="right">▶</button>'+
      '</div>'+
      '<div class="actionpad">'+
        '<button class="tbtn" data-fid="'+f.id+'" data-act="attack">⚔</button>'+
        '<button class="tbtn danger" data-fid="'+f.id+'" data-act="block">🛡</button>'+
      '</div>';
    el.appendChild(cluster);
  });
  el.querySelectorAll('.tbtn').forEach(btn=>{
    const fid=btn.dataset.fid, act=btn.dataset.act;
    const down=(e)=>{
      e.preventDefault();
      touchHeld[fid]=touchHeld[fid]||{};
      touchHeld[fid][act]=true;
      if(act==='jump'||act==='attack'){ touchEdge[fid]=touchEdge[fid]||{}; touchEdge[fid][act]=true; }
      btn.classList.add('active-touch');
    };
    const up=(e)=>{
      e.preventDefault();
      if(touchHeld[fid]) touchHeld[fid][act]=false;
      btn.classList.remove('active-touch');
    };
    btn.addEventListener('pointerdown',down);
    btn.addEventListener('pointerup',up);
    btn.addEventListener('pointerleave',up);
    btn.addEventListener('pointercancel',up);
  });
}

/* ================= INPUT ================= */
window.addEventListener('keydown', e=>{
  if(matchActive && !paused){
    if(usedKeyCodes.has(e.code)) e.preventDefault();
    if(!keyState[e.code]) keyDownEdge[e.code]=true;
    keyState[e.code]=true;
  }
});
window.addEventListener('keyup', e=>{ keyState[e.code]=false; });

function collectInput(f){
  if(f.type==='computer') return aiDecide(f);
  if(device==='pc'){
    const k=f.keys;
    return {
      left: !!keyState[k.left], right: !!keyState[k.right], block: !!keyState[k.block],
      jump: !!keyDownEdge[k.jump], attack: !!keyDownEdge[k.attack]
    };
  } else {
    const th=touchHeld[f.id]||{}, te=touchEdge[f.id]||{};
    return { left:!!th.left, right:!!th.right, block:!!th.block, jump:!!te.jump, attack:!!te.attack };
  }
}

function aiDecide(f){
  f.ai.decisionTimer-=16;
  if(f.ai.decisionTimer<=0){
    f.ai.decisionTimer=180+Math.random()*220;
    const wdef=WEAPON_DEFS[f.weaponType];
    const targets=fighters.filter(t=>t!==f && t.hp>0);
    const d={left:false,right:false,jump:false,attack:false,block:false};
    if(targets.length){
      let target=targets[0], bd=Infinity;
      targets.forEach(t=>{ const dist=Math.abs(t.x-f.x); if(dist<bd){bd=dist; target=t;} });
      const dx=target.x-f.x, dist=Math.abs(dx);
      const effRange = Math.min(wdef.range, 260);
      if(dist>effRange-6){
        if(dx<0) d.left=true; else d.right=true;
        if(Math.random()<0.015) d.jump=true;
      } else {
        const r=Math.random();
        if(f.attackCooldown<=0 && r<0.55) d.attack=true;
        else if(r<0.72) d.block=true;
        else if(r<0.9){ if(dx<0) d.right=true; else d.left=true; }
      }
    }
    f.ai.decision=d;
  }
  return f.ai.decision;
}

/* ================= ARENA HAZARDS ================= */
function groundYAt(x){
  if(currentArena && currentArena.id==='wavy'){
    return GROUND_Y + Math.sin(matchElapsed*0.0012 + x*0.012)*22;
  }
  return GROUND_Y;
}

function updateArenaHazards(dt){
  matchElapsed+=dt;
  if(!currentArena) return;

  if(currentArena.id==='shrink'){
    const shrinkStart=8000, shrinkDuration=20000, minWidth=260;
    const fullMin=40, fullMax=960;
    const targetMin=(1000-minWidth)/2, targetMax=1000-targetMin;
    if(matchElapsed<shrinkStart){ arenaMin=fullMin; arenaMax=fullMax; }
    else {
      const p=Math.min(1,(matchElapsed-shrinkStart)/shrinkDuration);
      arenaMin=fullMin+(targetMin-fullMin)*p;
      arenaMax=fullMax+(targetMax-fullMax)*p;
    }
  } else {
    arenaMin=40; arenaMax=960;
  }

  if(currentArena.id==='lava'){
    const cycle=6000;
    const cycleIndex=Math.floor(matchElapsed/cycle);
    const phase=matchElapsed - cycleIndex*cycle;
    currentArena.lavaWarn = phase>=4500 && phase<5000;
    currentArena.lavaHot = phase>=5000 && phase<5500;
    if(currentArena.lavaHot && currentArena._lastTickCycle!==cycleIndex){
      lavaTick();
      currentArena._lastTickCycle=cycleIndex;
    }
  } else {
    currentArena.lavaWarn=false; currentArena.lavaHot=false;
  }
}

function lavaTick(){
  fighters.forEach(f=>{
    if(f.hp<=0 || !f.grounded) return;
    f.hp=Math.max(0,f.hp-6);
    f.state='hurt'; f.hurtTimer=HURT_DURATION; f.vy=-3;
    if(f.hp<=0 && f.state!=='dead'){ f.state='dead'; f.deathTimer=DEATH_DURATION; }
  });
}

/* ================= PHYSICS / COMBAT ================= */
function updateFighterPhysics(f,input,dt){
  if(f.attackCooldown>0) f.attackCooldown=Math.max(0,f.attackCooldown-dt);

  if(f.state==='hurt'){
    f.hurtTimer-=dt;
    if(f.hurtTimer<=0) f.state = f.grounded ? 'idle':'jump';
  }

  if(f.state==='attack'){
    const wdef=WEAPON_DEFS[f.weaponType];
    f.attackTimer-=dt;
    const progress=1-(f.attackTimer/wdef.duration);
    if(wdef.type!=='ranged' && !f.hasHit && progress>0.35 && progress<0.75) checkAttackHit(f,wdef);
    if(f.attackTimer<=0) f.state = f.grounded ? 'idle':'jump';
  }

  const locked = f.state==='attack' || f.state==='hurt';

  if(!locked){
    if(input.block && f.grounded){
      f.state='block'; f.vx=0;
    } else {
      if(input.left){ f.vx=-SPEED; f.facing=-1; }
      else if(input.right){ f.vx=SPEED; f.facing=1; }
      else f.vx=0;

      if(f.grounded && input.jump){ f.vy=JUMP_FORCE; f.grounded=false; }

      if(input.attack && f.grounded && f.attackCooldown<=0){
        const wdef=WEAPON_DEFS[f.weaponType];
        f.state='attack'; f.attackTimer=wdef.duration; f.attackCooldown=wdef.cooldown; f.vx=0;
        if(wdef.type==='ranged'){ spawnProjectile(f,wdef); f.hasHit=true; }
        else { f.hasHit=false; }
      } else if(!f.grounded){ f.state='jump'; }
      else if(f.vx!==0){ f.state='walk'; }
      else { f.state='idle'; }
    }
  }

  f.vy+=GRAVITY;
  f.x+=f.vx;
  f.y+=f.vy;

  const gY=groundYAt(f.x);
  if(f.y>=gY){
    const impact=f.vy;
    f.y=gY;
    if(currentArena && currentArena.id==='pingpong' && impact>4){
      f.vy=-impact*0.55; f.grounded=false;
    } else {
      f.vy=0; f.grounded=true;
    }
  } else { f.grounded=false; }

  if(currentArena && currentArena.id==='wavy' && f.grounded){
    const slope = groundYAt(f.x+1)-groundYAt(f.x-1);
    f.vx += slope*0.02;
  }

  f.x=Math.max(arenaMin, Math.min(arenaMax, f.x));
  f.animTime+=dt;
}

function checkAttackHit(f,wdef){
  fighters.forEach(target=>{
    if(target===f || target.hp<=0) return;
    const dx=target.x-f.x, dy=target.y-f.y;
    if(Math.abs(dy)>60) return;
    if(Math.abs(dx)>wdef.range) return;
    if(f.facing*dx<=0) return;
    applyDamage(target,f,wdef.damage,wdef.knockback);
  });
  f.hasHit=true;
}

function applyDamage(target,attacker,amount,knockback){
  let dmg=amount;
  const facingAttacker = target.facing*(attacker.x-target.x) > 0;
  if(target.state==='block' && facingAttacker){
    dmg=amount*0.2;
    target.vx=attacker.facing*Math.min(2,knockback);
  } else {
    target.state='hurt'; target.hurtTimer=HURT_DURATION;
    target.vx=attacker.facing*knockback; target.vy=-3;
  }
  target.hp=Math.max(0, target.hp-dmg);
  if(target.hp<=0 && target.state!=='dead'){
    target.state='dead'; target.deathTimer=DEATH_DURATION; target.vx*=0.5;
  }
}

function spawnProjectile(f,wdef){
  projectiles.push({
    x:f.x+f.facing*20, y:f.y-40, vx:f.facing*wdef.projectileSpeed, facing:f.facing,
    ownerId:f.id, color:f.weaponColor, dmg:wdef.damage, knockback:wdef.knockback
  });
}
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.x+=p.vx;
    let hit=false;
    fighters.forEach(target=>{
      if(hit || target.id===p.ownerId || target.hp<=0) return;
      if(Math.abs(target.x-p.x)<18 && Math.abs(target.y-p.y)<50){
        applyDamage(target, {x:p.x, facing:p.facing}, p.dmg, p.knockback);
        hit=true;
      }
    });
    if(hit || p.x<arenaMin-20 || p.x>arenaMax+20){ projectiles.splice(i,1); }
  }
}

function updateDeadPhysics(f,dt){
  if(f.deathTimer>0) f.deathTimer=Math.max(0,f.deathTimer-dt);
  f.vy+=GRAVITY; f.y+=f.vy; f.x+=f.vx*0.9; f.vx*=0.9;
  const gY=groundYAt(f.x);
  if(f.y>=gY){ f.y=gY; f.vy=0; }
  f.x=Math.max(arenaMin, Math.min(arenaMax, f.x));
}

function clearEdges(){
  keyDownEdge={};
  fighters.forEach(f=>{ if(touchEdge[f.id]){ touchEdge[f.id].jump=false; touchEdge[f.id].attack=false; } });
}

function update(dt){
  updateArenaHazards(dt);
  fighters.forEach(f=>{
    if(f.hp<=0){ updateDeadPhysics(f,dt); return; }
    const input=collectInput(f);
    updateFighterPhysics(f,input,dt);
  });
  updateProjectiles(dt);
  clearEdges();
}

/* ================= RENDER ================= */
function drawArenaBackground(){
  ctx.clearRect(0,0,CW,CH);
  let topTint='#0a1230', midTint='#070a18', botTint='#04060e', glowColor='0,229,255';
  if(currentArena){
    if(currentArena.id==='lava'){ topTint='#2a0e08'; midTint='#170805'; botTint='#0a0402'; glowColor='255,120,40'; }
    else if(currentArena.id==='shrink'){ topTint='#0a0a2a'; midTint='#06061a'; botTint='#03030d'; glowColor='177,75,255'; }
  }
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,topTint); g.addColorStop(0.6,midTint); g.addColorStop(1,botTint);
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);

  const rg=ctx.createRadialGradient(CW/2,40,20,CW/2,40,420);
  rg.addColorStop(0,'rgba('+glowColor+',0.18)'); rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg; ctx.fillRect(0,0,CW,CH);

  ctx.strokeStyle='rgba('+glowColor+',0.08)'; ctx.lineWidth=2;
  for(let x=60;x<CW;x+=140){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,groundYAt(x)); ctx.stroke(); }

  if(currentArena && currentArena.lavaWarn){
    ctx.fillStyle='rgba(255,60,20,0.12)'; ctx.fillRect(0,0,CW,CH);
  }

  const hot = currentArena && currentArena.lavaHot;
  ctx.strokeStyle = hot ? 'rgba(255,80,20,0.95)' : 'rgba('+glowColor+',0.55)';
  ctx.lineWidth=3; ctx.shadowColor = hot ? '#ff5014' : '#00e5ff'; ctx.shadowBlur = hot?20:12;
  ctx.beginPath();
  for(let x=0;x<=CW;x+=20){ const gy=groundYAt(x)+2; if(x===0) ctx.moveTo(x,gy); else ctx.lineTo(x,gy); }
  ctx.stroke();
  ctx.shadowBlur=0;

  ctx.fillStyle = hot ? 'rgba(60,10,5,0.9)' : 'rgba(3,6,14,0.9)';
  ctx.beginPath();
  ctx.moveTo(0,CH);
  for(let x=0;x<=CW;x+=20){ ctx.lineTo(x,groundYAt(x)+3); }
  ctx.lineTo(CW,CH);
  ctx.closePath();
  ctx.fill();

  if(currentArena && currentArena.id==='shrink'){
    ctx.save();
    ctx.strokeStyle='rgba(177,75,255,0.75)'; ctx.lineWidth=4; ctx.shadowColor='#b14bff'; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.moveTo(arenaMin,0); ctx.lineTo(arenaMin,CH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(arenaMax,0); ctx.lineTo(arenaMax,CH); ctx.stroke();
    ctx.restore();
  }
}

function drawLimb(ox,oy,ex,ey,bend){
  const dx=ex-ox, dy=ey-oy;
  const len=Math.hypot(dx,dy)||1;
  const px=-dy/len, py=dx/len;
  const mx=(ox+ex)/2+px*bend, my=(oy+ey)/2+py*bend;
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(mx,my); ctx.lineTo(ex,ey); ctx.stroke();
}

function drawWeapon(f,hx,hy,facing,state){
  const wdef=WEAPON_DEFS[f.weaponType]||WEAPON_DEFS.sword;
  if(wdef.type==='ranged'){
    ctx.save();
    ctx.strokeStyle=f.weaponColor; ctx.shadowColor=f.weaponColor; ctx.shadowBlur=14; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(hx, hy-16);
    ctx.quadraticCurveTo(hx-facing*16, hy, hx, hy+16);
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hx,hy-16); ctx.lineTo(hx,hy+16); ctx.stroke();
    ctx.restore();
    return;
  }

  const len=wdef.len;
  const dirX=facing, dirY= state==='attack' ? -0.3 : -0.15;
  const norm=Math.hypot(dirX,dirY)||1;
  const ux=dirX/norm, uy=dirY/norm;
  const tipX=hx+ux*len, tipY=hy+uy*len;
  ctx.save();
  ctx.strokeStyle=f.weaponColor; ctx.fillStyle=f.weaponColor;
  ctx.shadowColor=f.weaponColor; ctx.shadowBlur=16;
  ctx.lineWidth = (f.weaponType==='spear'||f.weaponType==='katana') ? 3 : 5;
  ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(tipX,tipY); ctx.stroke();

  if(f.weaponType==='sword'){
    const gx=hx+ux*10, gy=hy+uy*10;
    const px=-uy, py=ux;
    ctx.beginPath(); ctx.moveTo(gx-px*8,gy-py*8); ctx.lineTo(gx+px*8,gy+py*8); ctx.stroke();
  } else if(f.weaponType==='axe'){
    const px=-uy, py=ux;
    ctx.beginPath();
    ctx.moveTo(tipX,tipY);
    ctx.lineTo(tipX-ux*14+px*10, tipY-uy*14+py*10);
    ctx.lineTo(tipX-ux*14-px*10, tipY-uy*14-py*10);
    ctx.closePath(); ctx.fill();
  } else if(f.weaponType==='hammer'){
    ctx.beginPath(); ctx.arc(tipX,tipY,9,0,Math.PI*2); ctx.fill();
  } else if(f.weaponType==='claw'){
    const px=-uy, py=ux;
    for(let k=-1;k<=1;k++){
      ctx.beginPath();
      ctx.moveTo(hx+ux*8+px*k*6, hy+uy*8+py*k*6);
      ctx.lineTo(hx+ux*len+px*k*6, hy+uy*len+py*k*6);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawFighter(f){
  ctx.save();
  ctx.translate(f.x,f.y);
  const facing=f.facing;
  const dead=f.hp<=0;

  if(dead){
    const t=1-Math.max(0,f.deathTimer)/DEATH_DURATION;
    ctx.rotate(-facing*(Math.PI/2.2)*t);
  }

  ctx.globalAlpha = dead ? 0.5 : (f.skinFx==='ghost' ? 0.72 : 1);
  ctx.strokeStyle=f.color; ctx.fillStyle=f.color;
  ctx.lineWidth=6; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.shadowColor=f.color; ctx.shadowBlur = f.state==='hurt' ? 4 : (f.skinFx==='glow' ? 20 : 13);

  const legLen=42, torsoLen=32, neckLen=7, headR=10;
  let bob=0, legSwing=0, legBend=8, armBend=6, leanX=0;
  let frontHand={x:facing*11,y:-legLen-torsoLen+23};
  let backHand={x:-facing*11,y:-legLen-torsoLen+23};

  const t2=f.animTime;
  if(f.state==='walk'){
    legSwing=Math.sin(t2*0.012)*13;
    const sw=Math.sin(t2*0.012)*10;
    bob=Math.abs(Math.sin(t2*0.012))*2.5;
    frontHand={x:facing*(10-sw), y:-legLen-torsoLen+24};
    backHand={x:-facing*(10-sw), y:-legLen-torsoLen+24};
  } else if(f.state==='idle'){
    bob=Math.sin(t2*0.0035)*2;
    const sw=Math.sin(t2*0.0035)*3;
    frontHand={x:facing*(11+sw), y:-legLen-torsoLen+23};
    backHand={x:-facing*(11-sw), y:-legLen-torsoLen+23};
  } else if(f.state==='jump'){
    legBend=20; bob=-3;
    frontHand={x:facing*13, y:-legLen-torsoLen+14};
    backHand={x:-facing*13, y:-legLen-torsoLen+14};
  } else if(f.state==='block'){
    armBend=10;
    frontHand={x:facing*16, y:-legLen-torsoLen+6};
    backHand={x:facing*14, y:-legLen-torsoLen+16};
  } else if(f.state==='attack'){
    const wdef=WEAPON_DEFS[f.weaponType];
    const p=Math.min(1,Math.max(0,1-(f.attackTimer/wdef.duration)));
    const swing=Math.sin(p*Math.PI);
    frontHand={x:facing*(16+swing*32), y:-legLen-torsoLen+22-swing*18};
    backHand={x:-facing*6, y:-legLen-torsoLen+22};
  } else if(f.state==='hurt'){
    leanX=-facing*5;
    frontHand={x:facing*4, y:-legLen-torsoLen+18};
    backHand={x:-facing*10, y:-legLen-torsoLen+26};
  }

  const hipY=-legLen+bob;
  const shoulderY=hipY-torsoLen;
  const headCenterY=shoulderY-neckLen-headR;
  const hipX=leanX*0.4, shoulderX=leanX;

  drawLimb(hipX,hipY, -9+legSwing, 1, legBend);
  drawLimb(hipX,hipY, 9-legSwing, 1, -legBend);
  ctx.beginPath(); ctx.moveTo(hipX,hipY); ctx.lineTo(shoulderX,shoulderY); ctx.stroke();
  drawLimb(shoulderX,shoulderY, backHand.x, backHand.y, -armBend);
  drawLimb(shoulderX,shoulderY, frontHand.x, frontHand.y, armBend);
  ctx.beginPath(); ctx.arc(shoulderX*0.6, headCenterY, headR, 0, Math.PI*2); ctx.fill();
  drawWeapon(f, frontHand.x, frontHand.y, facing, f.state);

  ctx.restore();
}

function drawProjectile(p){
  ctx.save();
  ctx.strokeStyle=p.color; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=14;
  ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(p.x-p.facing*10,p.y); ctx.lineTo(p.x+p.facing*6,p.y); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x+p.facing*10,p.y);
  ctx.lineTo(p.x+p.facing*2,p.y-4);
  ctx.lineTo(p.x+p.facing*2,p.y+4);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function render(){
  drawArenaBackground();
  fighters.forEach(drawFighter);
  projectiles.forEach(drawProjectile);
}

/* ================= MAIN LOOP ================= */
function loop(ts){
  if(!matchActive) return;
  animId=requestAnimationFrame(loop);
  if(paused){ lastTime=ts; return; }
  const dt=Math.min(40, ts-lastTime || 16);
  lastTime=ts;
  update(dt);
  render();
  updateHUD();
  const alive=fighters.filter(f=>f.hp>0);
  if(alive.length<=1){ endMatch(alive[0]||null); }
}

function endMatch(winner){
  matchActive=false;
  cancelAnimationFrame(animId);

  let earned=0;
  fighters.forEach(f=>{
    if(f.type!=='player') return;
    if(winner && f.id===winner.id){ earned+=50; xpTotal+=40; }
    else { earned+=15; xpTotal+=10; }
  });
  coins+=earned;
  const newLevel=Math.floor(xpTotal/100)+1;
  const leveledUp = newLevel>level;
  level=newLevel;

  const ov=document.getElementById('winOverlay');
  const title=document.getElementById('winTitle');
  const sub=document.getElementById('winSub');
  const reward=document.getElementById('winReward');
  if(winner){
    title.textContent='P'+(winner.id+1)+' Wins!';
    title.style.color=winner.color;
    title.style.textShadow='0 0 26px '+winner.color;
    sub.textContent = winner.type==='computer' ? 'Computer Fighter 🤖' : 'Player';
  } else {
    title.textContent='Draw!'; title.style.color='var(--gold)'; sub.textContent='Sab out ho gaye 🤝';
  }
  reward.textContent = '🪙 +'+earned+' Coins'+(leveledUp ? '   ⭐ LEVEL UP! Lvl '+level : '');
  ov.classList.remove('hidden');
}

function togglePause(){
  if(!matchActive) return;
  paused=!paused;
  document.getElementById('pauseBtn').textContent = paused?'▶':'⏸';
  document.getElementById('countdown').textContent = paused?'PAUSED':'';
}
function exitMatch(){
  matchActive=false;
  cancelAnimationFrame(animId);
  goToScreen('home');
  renderHome();
}
function rematch(){
  document.getElementById('winOverlay').classList.add('hidden');
  startMatch();
}
function backToSetup(){
  document.getElementById('winOverlay').classList.add('hidden');
  goToScreen('setup');
  renderSetup();
}
function goHomeFromWin(){
  document.getElementById('winOverlay').classList.add('hidden');
  goToScreen('home');
  renderHome();
}
</script>
